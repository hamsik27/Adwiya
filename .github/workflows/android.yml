name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm install -D typescript # حل مشكلة capacitor.config.ts

      - run: npm run build

      - run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4 # تحديث للإصدار v4 لضمان العمل
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
