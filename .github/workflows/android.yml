name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm install -D typescript # ضروري لملفات الإعداد

      - run: npm run build # تحويل مشروع React إلى ملفات جاهزة

      # مسح مجلد أندرويد القديم وإعادة بنائه لضمان وجود ملفات Gradle
      - run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4 # تحديث للإصدار v4 لضمان العمل
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
